services:
  - type: web
    name: kissanlink
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: RENDER_URL
        sync: false        # set this to https://kissanlink.onrender.com after first deploy
      - key: KEEPALIVE_INTERVAL
        value: 300         # seconds between self-pings (5 minutes)
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        sync: false
      - key: MONGODB_URI
        sync: false
